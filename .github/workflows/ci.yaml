name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            sky2108/payment-ui:latest
            sky2108/payment-ui:${{ github.sha }}

      - name: Update GitOps Repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/idp-lab-org/idp-lab-gitops.git
          cd idp-lab-gitops
          sed -i "s|image: sky2108/payment-ui:.*|image: sky2108/payment-ui:${{ github.sha }}|" apps/payment-ui/deployment.yaml
          git config user.email "ci@idp-lab.dev"
          git config user.name "CI Bot"
          git add .
          git commit -m "Update payment-ui image to ${{ github.sha }}"
          git push
